# -- Server
spring.application.name=ESL
server.port=8080
server.servlet.context-path=/esl
spring.profiles.active=local

# -- JWT
jwt.expiration-ms=86400000

# -- Dragon ESL API
dragon.esl.connect-timeout-ms=15000
dragon.esl.read-timeout-ms=60000
dragon.esl.public-key-path=/zk/user/getErpPublicKey
dragon.esl.login-path=/zk/user/login

# -- Logging
logging.level.com.cscs.digitalpricetag=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
# -- Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
